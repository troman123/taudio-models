# taudio-models — Docker usage (host Python untouched)
#
#   docker compose build
#   docker compose run --rm smoke
#   docker compose run --rm denoise /data/in/noisy.wav -o /data/out
#
# Local pip remains a first-class alternative; see README / docs/usage.md

services:
  denoise:
    build:
      context: .
      dockerfile: Dockerfile
    image: taudio-models:denoise
    environment:
      TAUDIO_MODELS_ROOT: /app
      TAUDIO_MODEL_CACHE: /cache/models
    volumes:
      - ./data:/data
      - taudio-model-cache:/cache

  smoke:
    image: taudio-models:denoise
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      TAUDIO_MODELS_ROOT: /app
      TAUDIO_MODEL_CACHE: /cache/models
    volumes:
      - ./data:/data
      - taudio-model-cache:/cache
    entrypoint: ["bash", "/app/scripts/docker_smoke.sh"]

volumes:
  taudio-model-cache:
