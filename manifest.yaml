# taudio-engines manifest
# Weights NEVER in git. Models expose a unified ModelParams schema for TaudioProcess.
schema_version: 2

# Shared param fragments referenced by engines (optional DRY).
param_presets:
  device:
    name: device
    type: enum
    default: auto
    choices: [auto, cpu, cuda, mps]
    description: Inference device
  is_gpu:
    name: is_gpu
    type: bool
    default: true
    description: Prefer GPU when available

engines:
  ause:
    display_name: Audio Separator (RoFormer / MDX)
    description: Vocal / instrumental / lead / backing separation via audio-separator stack
    lib: libs/audio_separatorv
    aliases: [ausev, ausevl, ausevb, ausei, auseiv]
    requires_models: []
    capabilities: [separate_vocals, separate_instrumental, separate_lead, separate_backing]
    output_stems: [vocals, instrumental, lead, backing]
    license_spdx: TBD
    license_file: licenses/audio_separatorv/LICENSE
    redistributable: true
    status: planned
    params:
      - name: variant
        type: enum
        default: vocal
        choices: [vocal, vocallead, vocalback, instrumental, iv]
        description: Which stem mapping to produce (aligns with ausev/ausevl/...)
      - name: model_weight
        type: enum
        default: rofep
        choices: [rofep, melk2, rofk2, rofk1]
        description: "Weight alias resolved via models section when registered"
      - name: split
        type: bool
        default: false
        description: Split long audio before separation (sp=1)
      - name: device
        type: enum
        default: auto
        choices: [auto, cpu, cuda, mps]
        description: Inference device
      - name: is_gpu
        type: bool
        default: true
        description: Prefer GPU when available

  melro:
    display_name: MelBand RoFormer
    description: Mel-band RoFormer vocal / instrumental separation
    lib: libs/mel_band_roformer
    aliases: [melrov, melroi, melroiv]
    requires_models: []
    capabilities: [separate_vocals, separate_instrumental]
    output_stems: [vocals, instrumental]
    license_spdx: TBD
    license_file: licenses/melro/LICENSE
    redistributable: true
    status: planned
    params:
      - name: variant
        type: enum
        default: vocal
        choices: [vocal, instrumental, iv]
        description: Output selection
      - name: device
        type: enum
        default: auto
        choices: [auto, cpu, cuda, mps]
      - name: is_gpu
        type: bool
        default: true

  demucs:
    display_name: Demucs
    description: Demucs instrumental / multi-stem separation
    lib: libs/demucsv
    aliases: [dmiv]
    requires_models: []
    capabilities: [separate_vocals, separate_instrumental]
    output_stems: [vocals, instrumental]
    license_spdx: MIT
    license_file: licenses/demucs/LICENSE
    redistributable: true
    status: planned
    params:
      - name: device
        type: enum
        default: auto
        choices: [auto, cpu, cuda, mps]
      - name: is_gpu
        type: bool
        default: true

  deepfilter:
    display_name: DeepFilterNet
    description: Speech denoise / enhancement
    lib: libs/DeepFilterNet
    aliases: [de, de2, de3, dede, dede2]
    requires_models: []
    capabilities: [denoise, enhance]
    output_stems: [other]
    license_spdx: TBD
    license_file: licenses/deepfilternet/LICENSE
    redistributable: true
    status: planned
    params:
      - name: version
        type: enum
        default: "3"
        choices: ["1", "2", "3"]
        description: DeepFilterNet major version
      - name: device
        type: enum
        default: auto
        choices: [auto, cpu, cuda, mps]
      - name: is_gpu
        type: bool
        default: true

# Register downloadable weights here (urls + sha256). Empty until published.
models: {}
